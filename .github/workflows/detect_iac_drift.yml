name: Detect IaC drift (self-hosted)
on:
  workflow_dispatch:
    inputs:
      check_aws_stack:
        description: "Check Terraform drift for the AWS stack"
        required: false
        default: "true"
      check_openstack_stack:
        description: "Check Terraform drift for the OpenStack stack"
        required: false
        default: "true"
      publish_to_siem:
        description: "Publish drift findings and triage results to Elasticsearch"
        required: false
        default: "true"
      openrc_path:
        description: "Path to the OpenStack RC file on the self-hosted runner"
        required: false
        default: "/etc/kolla/admin-openrc.sh"
      openstack_activate_path:
        description: "Path to the OpenStack CLI/Kolla virtualenv activation script on the self-hosted runner"
        required: false
        default: "~/kolla-venv/bin/activate"
      aws_region:
        description: "AWS region for drift detection"
        required: false
        default: "ap-southeast-1"
      pipeline_source:
        description: "Pipeline source tag stored in Elasticsearch"
        required: false
        default: "github-self-hosted-hybrid-drift"
  schedule:
    - cron: "0 2 * * *"

jobs:
  detect-iac-drift:
    runs-on:
      - self-hosted
      - linux
      - openstack
    permissions:
      contents: read
      id-token: write
    env:
      ELASTICSEARCH_HOST: ${{ secrets.ELASTICSEARCH_HOST }}
      ELASTICSEARCH_PORT: ${{ secrets.ELASTICSEARCH_PORT }}
      ELASTICSEARCH_SCHEME: ${{ secrets.ELASTICSEARCH_SCHEME }}
      CFG_CHECK_AWS_STACK: ${{ github.event_name == 'workflow_dispatch' && inputs.check_aws_stack || 'true' }}
      CFG_CHECK_OPENSTACK_STACK: ${{ github.event_name == 'workflow_dispatch' && inputs.check_openstack_stack || 'true' }}
      CFG_PUBLISH_TO_SIEM: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_to_siem || 'true' }}
      CFG_OPENRC_PATH: ${{ github.event_name == 'workflow_dispatch' && inputs.openrc_path || '/etc/kolla/admin-openrc.sh' }}
      CFG_OPENSTACK_ACTIVATE_PATH: ${{ github.event_name == 'workflow_dispatch' && inputs.openstack_activate_path || '~/kolla-venv/bin/activate' }}
      CFG_AWS_REGION: ${{ github.event_name == 'workflow_dispatch' && inputs.aws_region || 'ap-southeast-1' }}
      CFG_PIPELINE_SOURCE: ${{ github.event_name == 'workflow_dispatch' && inputs.pipeline_source || 'github-self-hosted-hybrid-drift' }}
      TFSTATE_ROOT: "~/.misconfig-hybrid-sandbox/tfstate"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.5.0"

      - name: Install base dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Restore Terraform state snapshots
        run: |
          REAL_TFSTATE_ROOT="${TFSTATE_ROOT/#\~/$HOME}"
          mkdir -p "${REAL_TFSTATE_ROOT}"
          bash ./scripts/sync_terraform_state.sh restore ./iac/aws "${REAL_TFSTATE_ROOT}" aws
          bash ./scripts/sync_terraform_state.sh restore ./iac/openstack "${REAL_TFSTATE_ROOT}" openstack

      - name: Verify Terraform state snapshots
        run: |
          if [[ "${CFG_CHECK_AWS_STACK}" == "true" && ! -f ./iac/aws/terraform.tfstate ]]; then
            echo "Missing restored Terraform state for ./iac/aws. Deploy through the hybrid delivery workflow first." >&2
            exit 1
          fi
          if [[ "${CFG_CHECK_OPENSTACK_STACK}" == "true" && ! -f ./iac/openstack/terraform.tfstate ]]; then
            echo "Missing restored Terraform state for ./iac/openstack. Deploy through the hybrid delivery workflow first." >&2
            exit 1
          fi

      - name: Verify AWS authentication
        if: env.CFG_CHECK_AWS_STACK == 'true'
        env:
          AWS_REGION: ${{ env.CFG_AWS_REGION }}
        run: |
          aws sts get-caller-identity >/dev/null

      - name: Verify OpenStack authentication
        if: env.CFG_CHECK_OPENSTACK_STACK == 'true'
        run: |
          OPENSTACK_ACTIVATE_PATH="${CFG_OPENSTACK_ACTIVATE_PATH}"
          OPENRC_PATH="${CFG_OPENRC_PATH}"
          if [[ -n "${OPENSTACK_ACTIVATE_PATH}" ]]; then
            source "${OPENSTACK_ACTIVATE_PATH/#\~/$HOME}"
          fi
          set -a
          source "${OPENRC_PATH/#\~/$HOME}"
          set +a
          openstack token issue -f value -c id >/dev/null

      - name: Detect AWS IaC drift
        if: env.CFG_CHECK_AWS_STACK == 'true'
        run: |
          python -m src.remediation.detect_iac_drift \
            --terraform-dir ./iac/aws \
            --provider aws \
            --stack-name aws \
            --region "${CFG_AWS_REGION}" \
            --output-dir ./artifacts/drift/aws

      - name: Detect OpenStack IaC drift
        if: env.CFG_CHECK_OPENSTACK_STACK == 'true'
        run: |
          OPENSTACK_ACTIVATE_PATH="${CFG_OPENSTACK_ACTIVATE_PATH}"
          OPENRC_PATH="${CFG_OPENRC_PATH}"
          if [[ -n "${OPENSTACK_ACTIVATE_PATH}" ]]; then
            source "${OPENSTACK_ACTIVATE_PATH/#\~/$HOME}"
          fi
          set -a
          source "${OPENRC_PATH/#\~/$HOME}"
          set +a
          python -m src.remediation.detect_iac_drift \
            --terraform-dir ./iac/openstack \
            --provider openstack \
            --stack-name openstack \
            --output-dir ./artifacts/drift/openstack

      - name: Merge drift findings
        run: |
          INPUTS=()
          if [[ -f ./artifacts/drift/aws/findings.json ]]; then
            INPUTS+=(./artifacts/drift/aws/findings.json)
          fi
          if [[ -f ./artifacts/drift/openstack/findings.json ]]; then
            INPUTS+=(./artifacts/drift/openstack/findings.json)
          fi
          if [[ "${#INPUTS[@]}" -gt 0 ]]; then
            python scripts/merge_json_collections.py \
              --inputs "${INPUTS[@]}" \
              --dedup-findings \
              --output ./artifacts/drift/findings.json
            python -m src.triage.engine \
              --input ./artifacts/drift/findings.json \
              --output ./artifacts/drift/decisions.json
          else
            echo "[]" > ./artifacts/drift/findings.json
            echo "[]" > ./artifacts/drift/decisions.json
          fi

      - name: Publish drift findings to Elasticsearch
        if: env.CFG_PUBLISH_TO_SIEM == 'true'
        run: |
          python -m src.siem.publisher \
            --findings ./artifacts/drift/findings.json \
            --decisions ./artifacts/drift/decisions.json \
            --pipeline-source "${CFG_PIPELINE_SOURCE}" \
            --branch "${GITHUB_REF_NAME}" \
            --commit-sha "${GITHUB_SHA}"

      - name: Upload drift artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iac-drift-artifacts
          if-no-files-found: warn
          path: |
            artifacts/drift/

      - name: Write workflow summary
        if: always()
        run: |
          REAL_TFSTATE_ROOT="${TFSTATE_ROOT/#\~/$HOME}"
          {
            echo "## IaC drift detection summary"
            echo ""
            echo "- AWS stack checked: \`${CFG_CHECK_AWS_STACK}\`"
            echo "- OpenStack stack checked: \`${CFG_CHECK_OPENSTACK_STACK}\`"
            echo "- Persistent tfstate root: \`${REAL_TFSTATE_ROOT}\`"
            echo "- Drift findings artifact: \`artifacts/drift/findings.json\`"
          } >> "$GITHUB_STEP_SUMMARY"
