name: Scan and remediate misconfiguration
on:
  push:
    branches:
      - main
      - feat/normalize
      - feat/scan_and_triage
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      enable_remediation:
        description: "Enable auto-remediation"
        required: false
        default: 'false'
      dispatch_live_integrations:
        description: "Send triage notifications to Jira/ServiceNow/Slack/Teams"
        required: false
        default: 'false'
      reconcile_m5_drift:
        description: "Run the M5 drift detection/reconcile flow"
        required: false
        default: 'false'
      simulate_m5_drift:
        description: "Create the M5 drift before reconciliation"
        required: false
        default: 'false'
      force_rds_cutover:
        description: "Force the M4 RDS encrypted replacement cutover"
        required: false
        default: 'false'
      delete_archived_rds:
        description: "Delete the archived pre-cutover RDS instance after force cutover"
        required: false
        default: 'false'
jobs:
  scan:
    runs-on: ubuntu-latest
    environment: THAODINH_DEV
    permissions:
      id-token: write
      contents: read
      issues: write
      pull-requests: write
    services:
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.8.0
        env:
          discovery.type: single-node
          xpack.security.enabled: 'false'
        options: >-
          --health-cmd "curl -s http://localhost:9200 >/dev/null || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 9200:9200
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_QVIET }}
          aws-region: us-east-1

      - name: Install Base Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Verify Python runtime dependencies
        run: |
          python -c "import dotenv, pydantic, elasticsearch; print('base runtime ok')"

      - name: Run unit tests
        run: |
          python -m pytest tests

      - name: Install Checkov
        run: |
          python -m venv /tmp/checkov-venv
          /tmp/checkov-venv/bin/pip install --upgrade pip
          /tmp/checkov-venv/bin/pip install -r requirements-checkov.txt

      - name: Install ScoutSuite
        run: |
          python -m venv /tmp/scoutsuite-venv
          /tmp/scoutsuite-venv/bin/pip install --upgrade pip
          /tmp/scoutsuite-venv/bin/pip install -r requirements-scoutsuite.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install CloudSploit
        run: |
          npm install -g cloudsploit
          echo "PATH=$(npm root -g)/.bin:$PATH" >> $GITHUB_ENV
          which cloudsploit || echo "CloudSploit not in PATH, will use npx"

      - name: Install tfsec
        run: |
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash
          command -v tfsec
          tfsec --version

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Run scanners
        env:
          AWS_REGION: us-east-1
          ELASTICSEARCH_HOST: localhost
          ELASTICSEARCH_PORT: 9200
          ELASTICSEARCH_SCHEME: http
          TERRAFORM_DIR: ./iac/terraform
        run: |
          PYTHON_BIN="$(command -v python)"
          export PATH="/tmp/checkov-venv/bin:/tmp/scoutsuite-venv/bin:$PATH"
          "$PYTHON_BIN" -m src.scanners.runner \
            --scoutsuite \
            --cloudsploit \
            --checkov \
            --tfsec \
            --trivy \
            --terraform-dir ./iac/terraform \
            --trivy-scan-ref ./iac/terraform \
            --output-dir ./scan_results

      - name: Triage findings
        run: |
          python -m src.triage.engine \
            --input ./scan_results/findings.json \
            --output ./triage_results/decisions.json

      - name: Generate manual review notifications
        env:
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_USERNAME: ${{ secrets.JIRA_USERNAME }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
          JIRA_ISSUE_TYPE: ${{ secrets.JIRA_ISSUE_TYPE }}
          SERVICENOW_URL: ${{ secrets.SERVICENOW_URL }}
          SERVICENOW_USER: ${{ secrets.SERVICENOW_USER }}
          SERVICENOW_PASSWORD: ${{ secrets.SERVICENOW_PASSWORD }}
          SERVICENOW_TABLE: ${{ secrets.SERVICENOW_TABLE }}
          SERVICENOW_CATEGORY: ${{ secrets.SERVICENOW_CATEGORY }}
          SERVICENOW_SUBCATEGORY: ${{ secrets.SERVICENOW_SUBCATEGORY }}
          SERVICENOW_ASSIGNMENT_GROUP_SYS_ID: ${{ secrets.SERVICENOW_ASSIGNMENT_GROUP_SYS_ID }}
          SERVICENOW_CALLER_SYS_ID: ${{ secrets.SERVICENOW_CALLER_SYS_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          NOTIFICATION_ARGS=()
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.dispatch_live_integrations }}" == "true" ]]; then
            NOTIFICATION_ARGS+=(--dispatch-live --fail-on-dispatch-error)
          fi
          python -m src.triage.notifications \
            --findings ./scan_results/findings.json \
            --decisions ./triage_results/decisions.json \
            --output-dir ./artifacts/triage_notifications \
            "${NOTIFICATION_ARGS[@]}"

      - name: Publish findings and triage to Elasticsearch
        env:
          ELASTICSEARCH_HOST: localhost
          ELASTICSEARCH_PORT: 9200
          ELASTICSEARCH_SCHEME: http
        run: |
          python -m src.siem.publisher \
            --findings ./scan_results/findings.json \
            --decisions ./triage_results/decisions.json \
            --pipeline-source github-actions \
            --branch "${GITHUB_REF_NAME}" \
            --commit-sha "${GITHUB_SHA}"

      - name: Upload triage notification artifacts
        uses: actions/upload-artifact@v4
        with:
          name: triage-notifications
          path: ./artifacts/triage_notifications

      - name: Upload normalized pipeline artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scan-results
          path: |
            scan_results/
            triage_results/
            artifacts/triage_notifications

      - name: Create findings summary
        run: |
          python -c "
          import json
          with open('./scan_results/findings.json') as f:
              findings = json.load(f)
          summary = {
              'total': len(findings),
              'by_severity': {},
          }
          for f in findings:
              sev = f.get('severity', 'UNKNOWN')
              summary['by_severity'][sev] = summary['by_severity'].get(sev, 0) + 1
          print('## Misconfig Scan Summary')
          print(f'Total findings: {summary[\"total\"]}')
          for severity, count in summary['by_severity'].items():
              print(f'- {severity}: {count}')
          " >> $GITHUB_STEP_SUMMARY

      - name: Install remediation toolchain
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.enable_remediation == 'true'
        run: |
          python -m venv /tmp/remediation-venv
          /tmp/remediation-venv/bin/pip install --upgrade pip
          /tmp/remediation-venv/bin/pip install -r requirements-remediation.txt
          curl -L -o /usr/local/bin/opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x /usr/local/bin/opa

      - name: Set up Terraform CLI for drift reconcile
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.enable_remediation == 'true' && github.event.inputs.reconcile_m5_drift == 'true'
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Execute AWS runtime remediation
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.enable_remediation == 'true'
        env:
          AWS_REGION: us-east-1
        run: |
          export PATH="/tmp/remediation-venv/bin:$PATH"
          RDS_ARGS=()
          if [[ "${{ github.event.inputs.force_rds_cutover }}" == "true" ]]; then
            RDS_ARGS+=(--force-rds-cutover)
          fi
          if [[ "${{ github.event.inputs.delete_archived_rds }}" == "true" ]]; then
            RDS_ARGS+=(--delete-archived-rds)
          fi
          python -m src.remediation.aws_runtime_executor \
            --findings ./scan_results/findings.json \
            --decisions ./triage_results/decisions.json \
            --region "${AWS_REGION}" \
            --project-prefix threat-demo \
            --approve-all-manual \
            --execute \
            --pipeline-source github-actions-runtime \
            --branch "${GITHUB_REF_NAME}" \
            --commit-sha "${GITHUB_SHA}" \
            "${RDS_ARGS[@]}"

      - name: Reconcile M5 drift
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.enable_remediation == 'true' && github.event.inputs.reconcile_m5_drift == 'true'
        env:
          AWS_REGION: us-east-1
        run: |
          DRIFT_ARGS=()
          if [[ "${{ github.event.inputs.simulate_m5_drift }}" == "true" ]]; then
            DRIFT_ARGS+=(--simulate-drift)
          fi
          python -m src.remediation.drift_reconcile \
            --terraform-dir ./iac/terraform \
            --region "${AWS_REGION}" \
            --project-prefix threat-demo \
            --execute \
            --pipeline-source github-actions-m5-drift \
            --branch "${GITHUB_REF_NAME}" \
            --commit-sha "${GITHUB_SHA}" \
            --output-dir ./artifacts/drift/m5 \
            "${DRIFT_ARGS[@]}"

      - name: Generate IAM wildcard review ticket
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.enable_remediation == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python -m src.remediation.opa_ticket \
            --findings ./scan_results/findings.json \
            --decisions ./triage_results/decisions.json \
            --output-dir ./artifacts/tickets/iam_wildcard_review \
            --pipeline-source github-actions-runtime \
            --branch "${GITHUB_REF_NAME}" \
            --commit-sha "${GITHUB_SHA}" \
            --repo "${GITHUB_REPOSITORY}" \
            --token "${GITHUB_TOKEN}" \
            --create-github-issue

      - name: Build remediation metrics
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.enable_remediation == 'true'
        run: |
          EXTRA_REMEDIATION_ARGS=()
          if [[ -f ./artifacts/drift/m5/reconcile_events.json ]]; then
            EXTRA_REMEDIATION_ARGS+=(--remediation-events ./artifacts/drift/m5/reconcile_events.json)
          fi
          python -m src.remediation.metrics \
            --findings ./scan_results/findings.json \
            --decisions ./triage_results/decisions.json \
            --remediation-events ./artifacts/remediation/aws_runtime_events.json \
            --remediation-events ./artifacts/tickets/iam_wildcard_review/review_events.json \
            --pipeline-source github-actions-runtime \
            --branch "${GITHUB_REF_NAME}" \
            --commit-sha "${GITHUB_SHA}" \
            --output ./artifacts/remediation/remediation_metrics.json \
            "${EXTRA_REMEDIATION_ARGS[@]}"

      - name: Publish remediation events and metrics
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.enable_remediation == 'true'
        env:
          ELASTICSEARCH_HOST: localhost
          ELASTICSEARCH_PORT: 9200
          ELASTICSEARCH_SCHEME: http
        run: |
          EXTRA_PUBLISH_ARGS=()
          if [[ -f ./artifacts/drift/m5/reconcile_events.json ]]; then
            EXTRA_PUBLISH_ARGS+=(--remediation-events ./artifacts/drift/m5/reconcile_events.json)
          fi
          python -m src.siem.publisher \
            --remediation-events ./artifacts/remediation/aws_runtime_events.json \
            --remediation-events ./artifacts/tickets/iam_wildcard_review/review_events.json \
            --metrics ./artifacts/remediation/remediation_metrics.json \
            --pipeline-source github-actions-runtime \
            --branch "${GITHUB_REF_NAME}" \
            --commit-sha "${GITHUB_SHA}" \
            "${EXTRA_PUBLISH_ARGS[@]}"

      - name: Upload remediation artifacts
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.enable_remediation == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: remediation-artifacts
          path: |
            artifacts/remediation/
            artifacts/tickets/
            artifacts/drift/
          
