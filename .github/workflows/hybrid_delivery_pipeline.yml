name: Hybrid infrastructure delivery (self-hosted)
on:
  push:
    branches:
      - main
      - feat/normalize
    paths:
      - 'iac/aws/**'
      - 'iac/openstack/**'
      - 'openstack/**'
      - 'src/**'
      - 'ansible/**'
      - 'policy/**'
      - 'scripts/**'
      - '.github/workflows/hybrid_delivery_pipeline.yml'
      - '.github/workflows/hybrid_runtime_scan.yml'
  workflow_dispatch:
    inputs:
      deploy_aws_stack:
        description: "Deploy the AWS Terraform stack before runtime scan/remediation"
        required: false
        default: "true"
      deploy_openstack_stack:
        description: "Deploy the OpenStack Terraform stack before runtime scan/remediation"
        required: false
        default: "true"
      include_aws_scan:
        description: "Run AWS runtime + IaC scanners after deployment"
        required: false
        default: "true"
      include_openstack_scan:
        description: "Run OpenStack export and normalization after deployment"
        required: false
        default: "true"
      include_openstack_object_storage:
        description: "Include the optional M1 OpenStack object storage scenario"
        required: false
        default: "false"
      publish_to_siem:
        description: "Publish post-deployment findings and remediation data to Elasticsearch"
        required: false
        default: "true"
      dispatch_live_integrations:
        description: "Send triage notifications to Jira/ServiceNow/Slack/Teams"
        required: false
        default: "false"
      enable_runtime_remediation:
        description: "Execute runtime remediation after deployment"
        required: false
        default: "true"
      generate_iac_pr:
        description: "Generate the IaC remediation PR bundle after deployment"
        required: false
        default: "true"
      force_rds_cutover:
        description: "Force the M4 encrypted RDS replacement cutover"
        required: false
        default: "false"
      delete_archived_rds:
        description: "Delete the archived pre-cutover RDS instance after force cutover"
        required: false
        default: "false"
      openrc_path:
        description: "Path to the OpenStack RC file on the self-hosted runner"
        required: false
        default: "/etc/kolla/admin-openrc.sh"
      openstack_activate_path:
        description: "Path to the OpenStack CLI/Kolla virtualenv activation script on the self-hosted runner"
        required: false
        default: "~/kolla-venv/bin/activate"
      project_prefix:
        description: "Resource prefix shared across the AWS/OpenStack demo lab"
        required: false
        default: "threat-demo"
      aws_region:
        description: "AWS region for deployment, scanners, and remediation"
        required: false
        default: "ap-southeast-1"
      pipeline_source:
        description: "Pipeline source tag stored in Elasticsearch"
        required: false
        default: "github-self-hosted-hybrid"
      allow_insecure_deploy_override:
        description: "Allow deployment to continue even if pre-deployment findings or container secrets are present"
        required: false
        default: "false"

jobs:
  resolve-config:
    runs-on: ubuntu-latest
    outputs:
      deploy_aws_stack: ${{ steps.resolve.outputs.deploy_aws_stack }}
      deploy_openstack_stack: ${{ steps.resolve.outputs.deploy_openstack_stack }}
      include_aws_scan: ${{ steps.resolve.outputs.include_aws_scan }}
      include_openstack_scan: ${{ steps.resolve.outputs.include_openstack_scan }}
      include_openstack_object_storage: ${{ steps.resolve.outputs.include_openstack_object_storage }}
      publish_to_siem: ${{ steps.resolve.outputs.publish_to_siem }}
      dispatch_live_integrations: ${{ steps.resolve.outputs.dispatch_live_integrations }}
      enable_runtime_remediation: ${{ steps.resolve.outputs.enable_runtime_remediation }}
      generate_iac_pr: ${{ steps.resolve.outputs.generate_iac_pr }}
      force_rds_cutover: ${{ steps.resolve.outputs.force_rds_cutover }}
      delete_archived_rds: ${{ steps.resolve.outputs.delete_archived_rds }}
      openrc_path: ${{ steps.resolve.outputs.openrc_path }}
      openstack_activate_path: ${{ steps.resolve.outputs.openstack_activate_path }}
      project_prefix: ${{ steps.resolve.outputs.project_prefix }}
      aws_region: ${{ steps.resolve.outputs.aws_region }}
      pipeline_source: ${{ steps.resolve.outputs.pipeline_source }}
      allow_insecure_deploy_override: ${{ steps.resolve.outputs.allow_insecure_deploy_override }}
    steps:
      - id: resolve
        env:
          GITHUB_EVENT_NAME_VALUE: ${{ github.event_name }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          with open(os.environ["GITHUB_EVENT_PATH"], "r", encoding="utf-8") as handle:
              event = json.load(handle)

          inputs = event.get("inputs", {}) if os.environ["GITHUB_EVENT_NAME_VALUE"] == "workflow_dispatch" else {}

          defaults = {
              "deploy_aws_stack": "true",
              "deploy_openstack_stack": "true",
              "include_aws_scan": "true",
              "include_openstack_scan": "true",
              "include_openstack_object_storage": "false",
              "publish_to_siem": "true",
              "dispatch_live_integrations": "false",
              "enable_runtime_remediation": "true",
              "generate_iac_pr": "true",
              "force_rds_cutover": "false",
              "delete_archived_rds": "false",
              "openrc_path": "/etc/kolla/admin-openrc.sh",
              "openstack_activate_path": "~/kolla-venv/bin/activate",
              "project_prefix": "threat-demo",
              "aws_region": "ap-southeast-1",
              "pipeline_source": "github-self-hosted-hybrid",
              "allow_insecure_deploy_override": "false",
          }

          for key, default in defaults.items():
              value = inputs.get(key, default) or default
              print(f"{key}={value}")
          PY

  pre-deployment-checks:
    needs: resolve-config
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    env:
      CFG_DEPLOY_AWS_STACK: ${{ needs.resolve-config.outputs.deploy_aws_stack }}
      CFG_DEPLOY_OPENSTACK_STACK: ${{ needs.resolve-config.outputs.deploy_openstack_stack }}
      CFG_ALLOW_INSECURE_DEPLOY_OVERRIDE: ${{ needs.resolve-config.outputs.allow_insecure_deploy_override }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.5.0"

      - name: Install base dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Run unit tests
        run: |
          python -m pytest tests

      - name: Install Checkov
        run: |
          python -m venv /tmp/checkov-venv
          /tmp/checkov-venv/bin/pip install --upgrade pip
          /tmp/checkov-venv/bin/pip install -r requirements-checkov.txt

      - name: Install tfsec and Trivy
        run: |
          install_with_retry() {
            local attempts="$1"
            shift
            local delay=2
            local n=1
            while true; do
              if "$@"; then
                return 0
              fi
              if [[ "$n" -ge "$attempts" ]]; then
                return 1
              fi
              n=$((n + 1))
              sleep "$delay"
              delay=$((delay * 2))
            done
          }
          mkdir -p "$HOME/.local/bin"
          TFSEC_BIN="$(command -v tfsec || true)"
          TRIVY_BIN="$(command -v trivy || true)"

          if [[ -z "$TFSEC_BIN" && -x /usr/local/bin/tfsec ]]; then
            TFSEC_BIN=/usr/local/bin/tfsec
          fi
          if [[ -z "$TRIVY_BIN" && -x "$HOME/.local/bin/trivy" ]]; then
            TRIVY_BIN="$HOME/.local/bin/trivy"
          fi

          if [[ -z "$TFSEC_BIN" ]]; then
            install_with_retry 3 bash -lc 'curl -sSfL https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash'
            TFSEC_BIN="$(command -v tfsec || true)"
            if [[ -z "$TFSEC_BIN" && -x /usr/local/bin/tfsec ]]; then
              TFSEC_BIN=/usr/local/bin/tfsec
            fi
          fi

          if [[ -z "$TRIVY_BIN" ]]; then
            install_with_retry 3 bash -lc 'curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b "$HOME/.local/bin"'
            TRIVY_BIN="$(command -v trivy || true)"
            if [[ -z "$TRIVY_BIN" && -x "$HOME/.local/bin/trivy" ]]; then
              TRIVY_BIN="$HOME/.local/bin/trivy"
            fi
          fi

          test -n "$TFSEC_BIN"
          test -x "$TFSEC_BIN"
          test -n "$TRIVY_BIN"
          test -x "$TRIVY_BIN"
          echo "$(dirname "$TFSEC_BIN")" >> "$GITHUB_PATH"
          echo "$(dirname "$TRIVY_BIN")" >> "$GITHUB_PATH"
          "$TFSEC_BIN" --version
          "$TRIVY_BIN" --version

      - name: Terraform format check
        run: |
          terraform fmt -check -recursive ./iac/aws ./iac/openstack

      - name: Terraform validate AWS stack
        if: env.CFG_DEPLOY_AWS_STACK == 'true'
        run: |
          terraform -chdir=./iac/aws init -input=false -backend=false
          terraform -chdir=./iac/aws validate

      - name: Terraform validate OpenStack stack
        if: env.CFG_DEPLOY_OPENSTACK_STACK == 'true'
        run: |
          terraform -chdir=./iac/openstack init -input=false -backend=false
          terraform -chdir=./iac/openstack validate

      - name: Run container secret guard (non-blocking evidence)
        id: container_secret_guard
        run: |
          set +e
          python scripts/scan_container_secrets.py \
            --paths ./iac/aws/m6_container_secrets.tf ./iac/aws/docker \
            --output ./artifacts/security/container_secret_report.json
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run pre-deployment IaC scans for AWS
        if: env.CFG_DEPLOY_AWS_STACK == 'true'
        run: |
          PYTHON_BIN="$(command -v python)"
          export PATH="/tmp/checkov-venv/bin:$PATH"
          "$PYTHON_BIN" -m src.scanners.runner \
            --checkov \
            --tfsec \
            --trivy \
            --provider aws \
            --terraform-dir ./iac/aws \
            --trivy-scan-ref ./iac/aws \
            --output-dir ./scan_results/pre_deploy/aws

      - name: Run pre-deployment IaC scans for OpenStack
        if: env.CFG_DEPLOY_OPENSTACK_STACK == 'true'
        run: |
          PYTHON_BIN="$(command -v python)"
          export PATH="/tmp/checkov-venv/bin:$PATH"
          "$PYTHON_BIN" -m src.scanners.runner \
            --checkov \
            --tfsec \
            --trivy \
            --provider openstack \
            --terraform-dir ./iac/openstack \
            --trivy-scan-ref ./iac/openstack \
            --output-dir ./scan_results/pre_deploy/openstack

      - name: Merge pre-deployment findings
        run: |
          INPUTS=()
          if [[ -f ./scan_results/pre_deploy/aws/findings.json ]]; then
            INPUTS+=(./scan_results/pre_deploy/aws/findings.json)
          fi
          if [[ -f ./scan_results/pre_deploy/openstack/findings.json ]]; then
            INPUTS+=(./scan_results/pre_deploy/openstack/findings.json)
          fi
          if [[ "${#INPUTS[@]}" -gt 0 ]]; then
            python scripts/merge_json_collections.py \
              --inputs "${INPUTS[@]}" \
              --dedup-findings \
              --output ./scan_results/pre_deployment_findings.json
            python -m src.triage.engine \
              --input ./scan_results/pre_deployment_findings.json \
              --output ./triage_results/pre_deployment_decisions.json
          else
            echo "No pre-deployment findings generated." > ./scan_results/pre_deployment_findings.txt
          fi

      - name: Enforce pre-deployment quality gate
        run: |
          GATE_ARGS=(
            --secret-guard-exit-code "${{ steps.container_secret_guard.outputs.exit_code }}"
            --output ./artifacts/pre_deployment/pre_deployment_gate_summary.json
          )
          if [[ -f ./scan_results/pre_deployment_findings.json ]]; then
            GATE_ARGS+=(--findings ./scan_results/pre_deployment_findings.json)
          fi
          if [[ -f ./triage_results/pre_deployment_decisions.json ]]; then
            GATE_ARGS+=(--decisions ./triage_results/pre_deployment_decisions.json)
          fi
          if [[ "${CFG_ALLOW_INSECURE_DEPLOY_OVERRIDE}" == "true" ]]; then
            GATE_ARGS+=(--allow-insecure-override)
          fi
          python -m src.triage.pre_deploy_gate "${GATE_ARGS[@]}"

      - name: Upload pre-deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pre-deployment-check-artifacts
          if-no-files-found: warn
          path: |
            scan_results/pre_deploy/
            scan_results/pre_deployment_findings.json
            scan_results/pre_deployment_findings.txt
            triage_results/pre_deployment_decisions.json
            artifacts/security/container_secret_report.json
            artifacts/pre_deployment/pre_deployment_gate_summary.json

      - name: Write workflow summary
        run: |
          {
            echo "## Pre-deployment checks summary"
            echo ""
            echo "- AWS deploy target enabled: \`${CFG_DEPLOY_AWS_STACK}\`"
            echo "- OpenStack deploy target enabled: \`${CFG_DEPLOY_OPENSTACK_STACK}\`"
            echo "- Container secret guard exit code: \`${{ steps.container_secret_guard.outputs.exit_code }}\`"
            echo "- Insecure deploy override: \`${CFG_ALLOW_INSECURE_DEPLOY_OVERRIDE}\`"
            echo "- Findings are published as artifacts for review before deployment."
          } >> "$GITHUB_STEP_SUMMARY"

  approval-gate:
    needs: pre-deployment-checks
    runs-on: ubuntu-latest
    environment:
      name: hybrid-cloud-deploy
    steps:
      - name: Await deployment approval
        run: |
          echo "Deployment gate satisfied for hybrid-cloud-deploy."

  deploy-infrastructure:
    needs:
      - approval-gate
      - resolve-config
    runs-on:
      - self-hosted
      - linux
      - openstack
    permissions:
      contents: read
      id-token: write
    env:
      CFG_DEPLOY_AWS_STACK: ${{ needs.resolve-config.outputs.deploy_aws_stack }}
      CFG_DEPLOY_OPENSTACK_STACK: ${{ needs.resolve-config.outputs.deploy_openstack_stack }}
      CFG_INCLUDE_OPENSTACK_OBJECT_STORAGE: ${{ needs.resolve-config.outputs.include_openstack_object_storage }}
      CFG_OPENRC_PATH: ${{ needs.resolve-config.outputs.openrc_path }}
      CFG_OPENSTACK_ACTIVATE_PATH: ${{ needs.resolve-config.outputs.openstack_activate_path }}
      CFG_PROJECT_PREFIX: ${{ needs.resolve-config.outputs.project_prefix }}
      CFG_AWS_REGION: ${{ needs.resolve-config.outputs.aws_region }}
      CFG_OPENSTACK_DEMO_PASSWORD: "ChangeMe123!"
      TFSTATE_ROOT: "~/.misconfig-hybrid-sandbox/tfstate"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.5.0"

      - name: Restore persistent Terraform state
        run: |
          REAL_TFSTATE_ROOT="${TFSTATE_ROOT/#\~/$HOME}"
          STATE_NAMESPACE="${CFG_PROJECT_PREFIX}"
          mkdir -p "${REAL_TFSTATE_ROOT}"
          bash ./scripts/sync_terraform_state.sh restore ./iac/aws "${REAL_TFSTATE_ROOT}" aws "${STATE_NAMESPACE}"
          bash ./scripts/sync_terraform_state.sh restore ./iac/openstack "${REAL_TFSTATE_ROOT}" openstack "${STATE_NAMESPACE}"

      - name: Verify AWS authentication
        if: env.CFG_DEPLOY_AWS_STACK == 'true'
        env:
          AWS_REGION: ${{ env.CFG_AWS_REGION }}
        run: |
          aws sts get-caller-identity >/dev/null

      - name: Verify OpenStack authentication
        if: env.CFG_DEPLOY_OPENSTACK_STACK == 'true'
        run: |
          OPENSTACK_ACTIVATE_PATH="${CFG_OPENSTACK_ACTIVATE_PATH}"
          OPENRC_PATH="${CFG_OPENRC_PATH}"
          if [[ -n "${OPENSTACK_ACTIVATE_PATH}" ]]; then
            source "${OPENSTACK_ACTIVATE_PATH/#\~/$HOME}"
          fi
          set -a
          source "${OPENRC_PATH/#\~/$HOME}"
          set +a
          openstack token issue -f value -c id >/dev/null

      - name: Deploy AWS Terraform stack
        if: env.CFG_DEPLOY_AWS_STACK == 'true'
        env:
          AWS_REGION: ${{ env.CFG_AWS_REGION }}
        run: |
          mkdir -p ./artifacts/deploy
          terraform -chdir=./iac/aws init -input=false
          terraform -chdir=./iac/aws apply -auto-approve \
            -var="aws_region=${AWS_REGION}" \
            -var="project_prefix=${CFG_PROJECT_PREFIX}"

      - name: Capture AWS Terraform outputs
        if: env.CFG_DEPLOY_AWS_STACK == 'true'
        run: |
          terraform -chdir=./iac/aws output -json > ./artifacts/deploy/aws_outputs.json

      - name: Persist AWS Terraform state snapshot
        if: always() && env.CFG_DEPLOY_AWS_STACK == 'true'
        run: |
          REAL_TFSTATE_ROOT="${TFSTATE_ROOT/#\~/$HOME}"
          STATE_NAMESPACE="${CFG_PROJECT_PREFIX}"
          bash ./scripts/sync_terraform_state.sh save ./iac/aws "${REAL_TFSTATE_ROOT}" aws "${STATE_NAMESPACE}"

      - name: Deploy OpenStack Terraform stack
        if: env.CFG_DEPLOY_OPENSTACK_STACK == 'true'
        run: |
          mkdir -p ./artifacts/deploy
          OPENSTACK_ACTIVATE_PATH="${CFG_OPENSTACK_ACTIVATE_PATH}"
          OPENRC_PATH="${CFG_OPENRC_PATH}"
          if [[ -n "${OPENSTACK_ACTIVATE_PATH}" ]]; then
            source "${OPENSTACK_ACTIVATE_PATH/#\~/$HOME}"
          fi
          set -a
          source "${OPENRC_PATH/#\~/$HOME}"
          set +a
          terraform -chdir=./iac/openstack init -input=false
          terraform -chdir=./iac/openstack apply -auto-approve \
            -var="project_prefix=${CFG_PROJECT_PREFIX}" \
            -var="demo_password=${CFG_OPENSTACK_DEMO_PASSWORD}" \
            -var="include_object_storage=${CFG_INCLUDE_OPENSTACK_OBJECT_STORAGE}"

      - name: Capture OpenStack Terraform outputs
        if: env.CFG_DEPLOY_OPENSTACK_STACK == 'true'
        run: |
          terraform -chdir=./iac/openstack output -json > ./artifacts/deploy/openstack_outputs.json

      - name: Persist OpenStack Terraform state snapshot
        if: always() && env.CFG_DEPLOY_OPENSTACK_STACK == 'true'
        run: |
          REAL_TFSTATE_ROOT="${TFSTATE_ROOT/#\~/$HOME}"
          STATE_NAMESPACE="${CFG_PROJECT_PREFIX}"
          bash ./scripts/sync_terraform_state.sh save ./iac/openstack "${REAL_TFSTATE_ROOT}" openstack "${STATE_NAMESPACE}"

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployed-infrastructure-outputs
          if-no-files-found: warn
          path: |
            artifacts/deploy/aws_outputs.json
            artifacts/deploy/openstack_outputs.json

      - name: Write deployment summary
        run: |
          {
            echo "## Deployment summary"
            echo ""
            echo "- AWS stack deployed: \`${CFG_DEPLOY_AWS_STACK}\`"
            echo "- OpenStack stack deployed: \`${CFG_DEPLOY_OPENSTACK_STACK}\`"
            echo "- Project prefix: \`${CFG_PROJECT_PREFIX}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  post-deployment-scan-remediate:
    needs:
      - deploy-infrastructure
      - resolve-config
    uses: ./.github/workflows/hybrid_runtime_scan.yml
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    with:
      include_aws_scan: ${{ needs.resolve-config.outputs.include_aws_scan }}
      include_openstack_scan: ${{ needs.resolve-config.outputs.include_openstack_scan }}
      include_openstack_object_storage: ${{ needs.resolve-config.outputs.include_openstack_object_storage }}
      publish_to_siem: ${{ needs.resolve-config.outputs.publish_to_siem }}
      dispatch_live_integrations: ${{ needs.resolve-config.outputs.dispatch_live_integrations }}
      enable_runtime_remediation: ${{ needs.resolve-config.outputs.enable_runtime_remediation }}
      reconcile_m5_drift: "false"
      simulate_m5_drift: "false"
      generate_iac_pr: ${{ needs.resolve-config.outputs.generate_iac_pr }}
      force_rds_cutover: ${{ needs.resolve-config.outputs.force_rds_cutover }}
      delete_archived_rds: ${{ needs.resolve-config.outputs.delete_archived_rds }}
      openrc_path: ${{ needs.resolve-config.outputs.openrc_path }}
      openstack_activate_path: ${{ needs.resolve-config.outputs.openstack_activate_path }}
      project_prefix: ${{ needs.resolve-config.outputs.project_prefix }}
      aws_region: ${{ needs.resolve-config.outputs.aws_region }}
      pipeline_source: ${{ needs.resolve-config.outputs.pipeline_source }}
    secrets: inherit
